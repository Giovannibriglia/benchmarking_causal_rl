envs:
  - CartPole-v1
algos:
  - {name: offline_dqn}
  - {name: offline_dqn_proximal}
  - {name: offline_dqn_sensitivity, networks: {gamma_sensitivity: 4.0}}
  - {name: offline_dqn_oracle_u}
offline_dataset:
  CartPole-v1: generated/cartpole/random-bias_confounded-sigma050-v0
behavior_policy: bias_confounded
behavior_strength: 0.5
n_episodes: 50
n_checkpoints: 10
rollout_len: 512
n_train_envs: 8
n_eval_envs: 8
aggregation: iqm
deterministic: true
seed: 0
