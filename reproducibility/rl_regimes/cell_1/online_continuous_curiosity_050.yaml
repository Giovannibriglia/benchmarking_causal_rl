# Cell 1 — Crystal Clear Clinic, continuous arm.
# curiosity strength sweep, strength = 0.5.
# Agent emits the max-ensemble-disagreement (novel) action with
# probability=strength, else its own action (curiosity-driven coverage).
# Only the off-policy collector (sac) is listed: behavior policies bias
# off-policy COLLECTION only; on-policy PPO collects its own rollouts and is
# unaffected (PPO lives in the baseline online_continuous.yaml). strength=0.0 reproduces
# the baseline collection exactly (pure agent) — kept as a clean grid anchor.
# Strength grid: {0.0, 0.25, 0.5, 0.75, 1.0}, from curiosity's natural [0, 1]
# mixture range. Refs: docs/experimental_design.md §4 Cell 1;
# bias_confounded strength=σ pattern from Cells 7/8.

envs:
  - Pendulum-v1
  - HalfCheetah-v5
  - Hopper-v5
  - Walker2d-v5

algos:
  - sac

behavior_policy: curiosity
behavior_strength: 0.5

n_episodes: 250
rollout_len: 1024
n_train_envs: 16
n_eval_envs: 16
n_checkpoints: 25
aggregation: iqm
deterministic: true
seed: 0
