# online_pomdp — the L-shaped sweep (ONLINE learning, PARTIAL observability).
#
# Same L as online_mdp but MASKED observations. ONLINE (data_regime: online): the
# behavior policy is the learner, so there is no shared offline generator and the
# offline `run_cell` driver refuses this regime — the arms run through the on-policy
# path. DISCRETE ONLY.
regime: online_pomdp
observability: pomdp
data_regime: online
discrete_only: true

pi_basic_epsilon: 0.5
confounder_c_r: 1.0

mask_indices:
  CartPole-v1: [1, 3]
  Acrobot-v1: [4, 5]

sweep:
  basic:      { beta: 0.0,                sigma: 0.0 }
  biased:     { beta: [0.25, 0.50, 0.75], sigma: 0.0 }
  confounded: { beta: 0.0,                sigma: [0.25, 0.50, 1.00] }
