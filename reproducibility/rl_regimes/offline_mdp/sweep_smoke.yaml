# offline_mdp SMOKE — a tiny-budget dry run of the full L (7 points), 1 env / 1 algo /
# 1 seed. Mirrors sweep.yaml; confirms the cell runs end-to-end in ~1-2 min before you
# commit the machine to the full budget. Run with:
#   uv run python main.py --reproduce rl_regimes/offline_mdp/sweep_smoke.yaml
#   ( or:  uv run python -m src.benchmarking.regime_sweep .../sweep.yaml --smoke ... )
# Routed to results_smoke/ (the --reproduce dispatch keys on "smoke" in the filename).
regime: offline_mdp
observability: mdp
data_regime: offline
discrete_only: true

generator_algo: dqn
pi_basic_epsilon: 0.5
confounder_c_r: 1.0

# tiny overrides of the ../_base defaults
envs:
  - CartPole-v1
algos:
  - cql
seeds:
  - 0
budgets:
  n_episodes: 20
  n_checkpoints: 2
  n_train_envs: 2
  n_eval_envs: 2
  rollout_len: 2
  rollout_episodes: 40
