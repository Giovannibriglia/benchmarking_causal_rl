# offline_pomdp SMOKE — a tiny-budget dry run of the full L (7 points), 1 env / 1 algo /
# 1 seed, MASKED obs + recurrent (lstm) base. Mirrors sweep.yaml. Run with:
#   uv run python main.py --reproduce rl_regimes/offline_pomdp/sweep_smoke.yaml
# Routed to results_smoke/ (the --reproduce dispatch keys on "smoke" in the filename).
regime: offline_pomdp
observability: pomdp
data_regime: offline
discrete_only: true

max_workers: 1  # groups run serially by default; --max-workers N (or >=2 here) parallelizes

generator_algo: dqn
pi_basic_epsilon: 0.5
confounder_c_r: 1.0

# Masked obs indices per env (the Cell-4/8 observability axis: hide the velocities).
mask_indices:
  CartPole-v1: [1, 3]

# offline_dqn_recurrent ACCEPTS the lstm critic_network the pomdp arm needs (plain
# offline_dqn carries the reject-guard).
envs:
  - CartPole-v1
algos:
  - offline_dqn_recurrent
seeds:
  - 0
budgets:
  n_episodes: 20
  n_checkpoints: 2
  n_train_envs: 2
  n_eval_envs: 2
  rollout_len: 2
  # rollout_episodes stays SMALL (40, the existing convention that keeps the sigma=1.0
  # gate stable) — the production 3000 must NOT leak into the smoke. offline_grad_steps
  # also tiny so the smoke exercises the new offline-budget path fast (not the 50k prod).
  rollout_episodes: 40
  offline_grad_steps: 40
