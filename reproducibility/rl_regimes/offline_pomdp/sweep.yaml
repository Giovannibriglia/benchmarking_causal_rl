# offline_pomdp — the L-shaped sweep (offline learning, PARTIAL observability).
#
# Same L as offline_mdp (7 points; shared origin; two 1-D arms; action-dependent
# confounder), but the observation is MASKED, so the strategy critics run on the
# recurrent (Cell-8) arm (lstm critic_network). DISCRETE ONLY (PR 1 / PR 3 gate).
regime: offline_pomdp
observability: pomdp
data_regime: offline
discrete_only: true

generator_algo: dqn
pi_basic_epsilon: 0.5
confounder_c_r: 1.0

# Masked obs indices per env (the Cell-4/8 observability axis: hide the velocities).
mask_indices:
  CartPole-v1: [1, 3]
  Acrobot-v1: [4, 5]

sweep:
  basic:      { beta: 0.0,                sigma: 0.0 }
  biased:     { beta: [0.25, 0.50, 0.75], sigma: 0.0 }
  confounded: { beta: 0.0,                sigma: [0.25, 0.50, 1.00] }

# The recurrent strategy triad is DQN-base only (Cell 8), so the pomdp cell runs the
# offline_dqn_recurrent base (which ACCEPTS the lstm critic_network the pomdp arm needs
# — plain offline_dqn carries the reject-guard). algos is narrowed here.
algos:
  - offline_dqn_recurrent

critics:
  basic:      [observational, proximal, oracle_u, sensitivity]
  biased:     [observational]
  confounded: [observational, proximal, oracle_u, sensitivity]
