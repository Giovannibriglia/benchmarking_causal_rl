# Cell 7 — Shadowed Vitals, discrete arm, σ = 0.00.
# Offline learning from a CONFOUNDED B2 dataset rolled out under bias_confounded
# at strength σ. Apparent training value inflates with σ while true eval return
# decays with σ — the centerpiece of the eight-cell taxonomy.
# Datasets must be pre-generated for THIS specific σ; see commit message.
# Refs: docs/experimental_design.md §4 Cell 7, §7 confounding metadata, §3.

envs:
  - CartPole-v1
  - LunarLander-v3
  - Acrobot-v1

algos:
  - offline_dqn
  - bcq
  - cql
  - iql

offline_dataset:
  CartPole-v1: generated/cartpole/random-bias_confounded-sigma000-v0
  LunarLander-v3: generated/lunarlander/random-bias_confounded-sigma000-v0
  Acrobot-v1: generated/acrobot/random-bias_confounded-sigma000-v0

# Behavior config is informational here — the dataset was rolled out under
# bias_confounded at σ=0.00; offline training reads the metadata to verify
# the gate passed (rejecting ungate-tested datasets per §7).
behavior_policy: bias_confounded
behavior_strength: 0.0

n_episodes: 250
rollout_len: 1024
n_train_envs: 16
n_eval_envs: 16
n_checkpoints: 25
aggregation: iqm
deterministic: true
seed: 0
