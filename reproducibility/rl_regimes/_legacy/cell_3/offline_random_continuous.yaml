# Cell 3 — Perfect Archive, continuous arm, random tier.
# Offline learning from a fully-observed random-tier B2 dataset. The
# random/medium/expert sweep separates the coverage axis from the regime
# axis. Datasets must be pre-generated; see commit message for the
# generation commands.
# Refs: docs/experimental_design.md §4 Cell 3, §3 common settings.

envs:
  - Pendulum-v1
  - HalfCheetah-v5
  - Hopper-v5
  - Walker2d-v5

algos:
  - cql_continuous
  - iql_continuous
  - bcq_continuous

offline_dataset:
  Pendulum-v1: generated/pendulum/random-v0
  HalfCheetah-v5: generated/halfcheetah/random-v0
  Hopper-v5: generated/hopper/random-v0
  Walker2d-v5: generated/walker2d/random-v0

n_episodes: 250
rollout_len: 1024
n_train_envs: 16
n_eval_envs: 16
n_checkpoints: 25
aggregation: iqm
deterministic: true
seed: 0
