# Cell 8 — Dark Ages, discrete arm, σ = 1.00.
# All three identification axes fail simultaneously: Z hidden (velocity masked
# per §5), πb unknown (no behavior policy info to the offline learner), U
# present (confounded data-generating process via bias_confounded at σ=1.00).
# Caps the taxonomy — non-identifiable from observations alone.
# Datasets reused from Cell 7 (same σ-encoded ids); mask applied at load time.
# Refs: docs/experimental_design.md §4 Cell 8, §5 masks, §7 confounding metadata, §3.

envs:
  - CartPole-v1
  - LunarLander-v3
  - Acrobot-v1

algos:
  - offline_dqn
  - bcq
  - cql
  - iql

offline_dataset:
  CartPole-v1: generated/cartpole/random-bias_confounded-sigma100-v0
  LunarLander-v3: generated/lunarlander/random-bias_confounded-sigma100-v0
  Acrobot-v1: generated/acrobot/random-bias_confounded-sigma100-v0

mask_indices:
  CartPole-v1: [1, 3]
  LunarLander-v3: [2, 3, 5]
  Acrobot-v1: [4, 5]

behavior_policy: bias_confounded
behavior_strength: 1.0

n_episodes: 250
rollout_len: 1024
n_train_envs: 16
n_eval_envs: 16
n_checkpoints: 25
aggregation: iqm
deterministic: true
seed: 0
