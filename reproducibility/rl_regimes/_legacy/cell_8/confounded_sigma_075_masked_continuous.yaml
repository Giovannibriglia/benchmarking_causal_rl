# Cell 8 — Dark Ages, continuous arm, σ = 0.75.
# All three identification axes fail simultaneously: Z hidden (velocity masked
# per §5), πb unknown (no behavior policy info to the offline learner), U
# present (confounded data-generating process via bias_confounded at σ=0.75).
# Caps the taxonomy — non-identifiable from observations alone.
# Datasets reused from Cell 7 (same σ-encoded ids); mask applied at load time.
# Refs: docs/experimental_design.md §4 Cell 8, §5 masks, §7 confounding metadata, §3.

envs:
  - Pendulum-v1
  - HalfCheetah-v5
  - Hopper-v5
  - Walker2d-v5

algos:
  - cql_continuous
  - iql_continuous
  - bcq_continuous

offline_dataset:
  Pendulum-v1: generated/pendulum/random-bias_confounded-sigma075-v0
  HalfCheetah-v5: generated/halfcheetah/random-bias_confounded-sigma075-v0
  Hopper-v5: generated/hopper/random-bias_confounded-sigma075-v0
  Walker2d-v5: generated/walker2d/random-bias_confounded-sigma075-v0

mask_indices:
  Pendulum-v1: [2]
  HalfCheetah-v5: [8, 9]
  Hopper-v5: [5, 6]
  Walker2d-v5: [9, 10]

behavior_policy: bias_confounded
behavior_strength: 0.75

n_episodes: 250
rollout_len: 1024
n_train_envs: 16
n_eval_envs: 16
n_checkpoints: 25
aggregation: iqm
deterministic: true
seed: 0
