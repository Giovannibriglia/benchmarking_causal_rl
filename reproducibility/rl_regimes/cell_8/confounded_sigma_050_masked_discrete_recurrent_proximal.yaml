# Cell 8 — Dark Ages, discrete arm, σ = 0.50 — RECURRENT DECONFOUNDING WEDGE (Gate B).
# The confounded working point for the recurrent deconfounding config: masked
# (POMDP) setup on the σ=0.5 dataset (+σ·U reward bonus present). With real
# confounding to remove, the proximal E-step must NOT collapse: the reward-shift
# spread clears the no-spread ε, delta > 0, r_tau departs the prior p, so the
# inferred u carries signal and q_su(.,0) ≠ q_su(.,1) -> Q_adj corrects the plain
# recurrent Q. i.e. recurrent proximal should open a wedge above the recurrent
# observational floor and toward the oracle_u ceiling (deconfounding on a
# confounded stream). Pair with the σ=0 collapse anchor to bound the wedge
# (collapse @σ0 -> wedge @σ0.5).
# Refs: docs/experimental_design.md §4 Cell 8; proximal σ>0 wedge; Cell-8 Gate B.

envs:
  - CartPole-v1
  - Acrobot-v1

algos:
  - name: offline_dqn_recurrent
    networks:
      critic: lstm
  - name: offline_dqn_recurrent_proximal
    networks:
      critic: lstm
  - name: offline_dqn_recurrent_oracle_u
    networks:
      critic: lstm

offline_dataset:
  CartPole-v1: generated/cartpole/random-bias_confounded-sigma050-v0
  Acrobot-v1: generated/acrobot/random-bias_confounded-sigma050-v0

mask_indices:
  CartPole-v1: [1, 3]
  Acrobot-v1: [4, 5]

behavior_policy: bias_confounded
behavior_strength: 0.5

n_episodes: 250
rollout_len: 1024
n_train_envs: 16
n_eval_envs: 16
n_checkpoints: 25
aggregation: iqm
deterministic: true
seed: 0
