# Cell 8 — Dark Ages, discrete arm, σ = 0.00 — RECURRENT COLLAPSE ANCHOR (Gate B).
# The safety anchor for the recurrent deconfounding config: same masked (POMDP)
# setup, but the unconfounded σ=0 dataset (no +σ·U reward bonus). With no
# confounding to remove, the proximal E-step must COLLAPSE: the reward-shift
# spread falls below the no-spread ε, delta -> 0, r_tau -> the prior p, so the
# sampled u is prior noise and q_su(.,0) ≈ q_su(.,1) -> Q_adj ≈ the plain
# recurrent Q. i.e. recurrent proximal must reduce to the recurrent observational
# floor at σ=0 (nothing invented from an unconfounded stream). The σ=0 confounding
# gate is skipped by construction (unconfounded baseline). Pair with the σ=1
# config to bound the deconfounding wedge (collapse @σ0 -> wedge @σ1).
# Refs: docs/experimental_design.md §4 Cell 8; proximal c_r=0 collapse (the safety
# proof); Cell-8 Gate B.

envs:
  - CartPole-v1
  - Acrobot-v1

algos:
  - name: offline_dqn_recurrent
    networks:
      critic: lstm
  - name: offline_dqn_recurrent_proximal
    networks:
      critic: lstm
  - name: offline_dqn_recurrent_oracle_u
    networks:
      critic: lstm

offline_dataset:
  CartPole-v1: generated/cartpole/random-bias_confounded-sigma000-v0
  Acrobot-v1: generated/acrobot/random-bias_confounded-sigma000-v0

mask_indices:
  CartPole-v1: [1, 3]
  Acrobot-v1: [4, 5]

behavior_policy: bias_confounded
behavior_strength: 0.0

n_episodes: 250
rollout_len: 1024
n_train_envs: 16
n_eval_envs: 16
n_checkpoints: 25
aggregation: iqm
deterministic: true
seed: 0
