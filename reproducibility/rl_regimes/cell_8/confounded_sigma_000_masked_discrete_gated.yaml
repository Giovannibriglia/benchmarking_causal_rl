# Cell 8 (gated) — Dark Ages, discrete-masked arm restricted to gate-passing envs.
# σ = 0.00. All three axes fail: Z hidden (velocity masked per §5), πb
# unknown, U present (confounded at σ). The absolute σ·U mechanism only induces
# detectable A→R structure for unit-reward-scale envs (CartPole +1/step, Acrobot
# −1/step); dense-reward (LunarLander) and continuous (MuJoCo) envs at σ≤1 give
# Corr(A,R) ≈ 0 and their gate-failed datasets are not loaded here. The
# scale-relative perturbation variant remains as future work.
# Refs: docs/experimental_design.md §4 Cell 8, §5 masks; original
# confounded_sigma_000_masked_discrete.yaml; diagnosis recon dated 2026-06-16.

envs:
  - CartPole-v1
  - Acrobot-v1

algos:
  - offline_dqn
  - bcq
  - cql
  - iql

offline_dataset:
  CartPole-v1: generated/cartpole/random-bias_confounded-sigma000-v0
  Acrobot-v1: generated/acrobot/random-bias_confounded-sigma000-v0

mask_indices:
  CartPole-v1: [1, 3]
  Acrobot-v1: [4, 5]

behavior_policy: bias_confounded
behavior_strength: 0.0

n_episodes: 250
rollout_len: 1024
n_train_envs: 16
n_eval_envs: 16
n_checkpoints: 25
aggregation: iqm
deterministic: true
seed: 0
