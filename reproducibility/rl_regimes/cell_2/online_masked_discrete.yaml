# Cell 2 — Invisible Gene, discrete arm.
# Online, hidden Z (velocity components masked), no confounding. Exercises the
# epistemic-POMDP signature: marginal return holds, per-context variance grows.
# Refs: docs/experimental_design.md §4 Cell 2, §5 per-env mask spec, §3 common settings.
# Recurrent baselines: LSTM variants of the listed algos are included for the
# POMDP-resolution demonstration (primary — Z hidden, recurrence should resolve the epistemic-POMDP signature). LSTM uses separate
# actor/critic trunks (defaults hidden_dim=128, num_layers=1; override per-YAML
# via networks: {hidden_dim, num_layers}).

envs:
  - CartPole-v1
  - LunarLander-v3
  - Acrobot-v1

algos:
  - ppo
  - dqn
  - {name: ppo, networks: {actor: lstm, critic: lstm}}
  - {name: dqn, networks: {actor: lstm, critic: lstm}}

mask_indices:
  CartPole-v1: [1, 3]
  LunarLander-v3: [2, 3, 5]
  Acrobot-v1: [4, 5]

n_episodes: 250
rollout_len: 1024
n_train_envs: 16
n_eval_envs: 16
n_checkpoints: 25
aggregation: iqm
deterministic: true
seed: 0
