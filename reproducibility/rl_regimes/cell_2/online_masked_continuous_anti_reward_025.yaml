# Cell 2 — Invisible Gene, masked continuous arm.
# anti_reward strength sweep, strength = 0.25.
# Agent takes its critic's argmin-Q (reward-pessimal) action with
# probability=strength, else its own action (critic-pessimal collection).
# Only the off-policy collector (sac) is listed: behavior policies bias
# off-policy COLLECTION only; on-policy PPO collects its own rollouts and is
# unaffected (PPO lives in the baseline online_masked_continuous.yaml). strength=0.0 reproduces
# the baseline collection exactly (pure agent) — kept as a clean grid anchor.
# Strength grid: {0.0, 0.25, 0.5, 0.75, 1.0}, from anti_reward's natural [0, 1]
# mixture range. Refs: docs/experimental_design.md §4 Cell 2, §5 per-env mask spec;
# bias_confounded strength=σ pattern from Cells 7/8.

envs:
  - Pendulum-v1
  - HalfCheetah-v5
  - Hopper-v5
  - Walker2d-v5

algos:
  - sac

mask_indices:
  Pendulum-v1: [2]
  HalfCheetah-v5: [8, 9]
  Hopper-v5: [5, 6]
  Walker2d-v5: [9, 10]

behavior_policy: anti_reward
behavior_strength: 0.25

n_episodes: 250
rollout_len: 1024
n_train_envs: 16
n_eval_envs: 16
n_checkpoints: 25
aggregation: iqm
deterministic: true
seed: 0
