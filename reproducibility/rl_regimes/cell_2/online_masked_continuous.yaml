# Cell 2 — Invisible Gene, continuous arm.
# Online, hidden Z (velocity components masked), no confounding. Exercises the
# epistemic-POMDP signature: marginal return holds, per-context variance grows.
# Continuous arm includes both on-policy (PPO) and off-policy (SAC) baselines,
# matching the discrete arm's PPO+DQN coverage.
# Refs: docs/experimental_design.md §4 Cell 2, §5 per-env mask spec, §3 common settings.

envs:
  - Pendulum-v1
  - HalfCheetah-v5
  - Hopper-v5
  - Walker2d-v5

algos:
  - sac
  - ppo

mask_indices:
  Pendulum-v1: [2]
  HalfCheetah-v5: [8, 9]
  Hopper-v5: [5, 6]
  Walker2d-v5: [9, 10]

n_episodes: 250
rollout_len: 1024
n_train_envs: 16
n_eval_envs: 16
n_checkpoints: 25
aggregation: iqm
deterministic: true
seed: 0
