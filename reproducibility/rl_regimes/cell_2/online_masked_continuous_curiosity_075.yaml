# Cell 2 — Invisible Gene, masked continuous arm.
# curiosity strength sweep, strength = 0.75.
# Agent emits the max-ensemble-disagreement (novel) action with
# probability=strength, else its own action (curiosity-driven coverage).
# Only the off-policy collector (sac) is listed: behavior policies in this
# YAML (curiosity) bias OFF-POLICY collection only. On-policy PPO is structurally
# rejected here at YAML load time — adding it would be a no-op redundant run (PPO
# ignores behavior_strength), and the runner's validation enforces this. PPO data
# for these cells lives in the baseline online_masked_continuous.yaml (behavior_policy=agent).
# strength=0.0 reproduces the baseline collection exactly (pure agent) — kept as
# a clean grid anchor.
# Strength grid: {0.0, 0.25, 0.5, 0.75, 1.0}, from curiosity's natural [0, 1]
# mixture range. Refs: docs/experimental_design.md §4 Cell 2, §5 per-env mask spec;
# bias_confounded strength=σ pattern from Cells 7/8.

envs:
  - Pendulum-v1
  - HalfCheetah-v5
  - Hopper-v5
  - Walker2d-v5

algos:
  - sac

mask_indices:
  Pendulum-v1: [2]
  HalfCheetah-v5: [8, 9]
  Hopper-v5: [5, 6]
  Walker2d-v5: [9, 10]

behavior_policy: curiosity
behavior_strength: 0.75

n_episodes: 250
rollout_len: 1024
n_train_envs: 16
n_eval_envs: 16
n_checkpoints: 25
aggregation: iqm
deterministic: true
seed: 0
