# Cell 6 "Fog of History" - discrete anchor.
# Offline, pi_b UNKNOWN (propensities discarded), Z hidden (mask at load):
# statistically unidentifiable in general. Basic: BC on the masked view.
# Variant: latent world model (GRU belief + BC head). EXPECTATION (binding):
# MODEST recovery - full recovery would be a red flag, not a success.
mode: causal_cells
cell: 6
anchor: discrete
task_env: CartPole-v1
eval_env: causal/cartpole-cell2
behavior_policy: unknown
mask_spec: velocities
tiers:
  medium: causal/cartpole/medium-v0
algos:
  basic: bc
  variant: latent_wm
seeds: [0, 1, 2, 3, 4]
training:
  n_steps: 4000
  batch_size: 256
ope:
  fqe_iters: 6000
  fqe_sync_every: 10
evaluation:
  n_episodes: 100
# Train-or-load per-seed Cell-1 reference (cached under references/;
# regenerated deterministically on a fresh clone - no gitignored deps).
reference:
  env: causal/cartpole-cell1
  algo: ppo
  n_episodes: 150
  rollout_len: 512
  n_train_envs: 8
  n_eval_envs: 8
  deterministic: true
