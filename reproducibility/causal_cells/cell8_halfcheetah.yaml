# Cell 8 "Dark Ages" - continuous anchor. Same confounded HC data, velocities
# masked, propensities discarded. KZ interval variant (non-identifiable).
mode: causal_cells
cell: 8
anchor: continuous
task_env: HalfCheetah-v5
eval_env: causal/halfcheetah-cell2
behavior_policy: unknown
mask_spec: velocities
tiers:
  g1d1p5: causal/halfcheetah/cell7-g1-d1p5-v0
dataset_expect:
  g1d1p5:
    gamma: 1.0
    delta: 1.5
algos:
  basic: bc
  variant: kz_select
  kz_candidates: bc cql  # K-Z LB-maximizer over continuous-native candidates
seeds: [0, 1, 2]
training:
  n_steps: 100000
  batch_size: 256
  eval_every: 100000000
ope:
  fqe_iters: 0          # FQE/DM/DR off (continuous OPE diagnostic-only)
  kz_gamma: 2.0
  kz_gamma: 2.0
evaluation:
  n_episodes: 30
  curve_episodes: 0   # curves off on continuous offline cells
# Regret normalizer: anchor-level constant J_ref^cont (Phase-6C
# ruling). Per-seed SAC references are trained separately and feed
# only the Cell-1 learning-curve panel, not these regret numbers.
reference_normalizer: 12451
