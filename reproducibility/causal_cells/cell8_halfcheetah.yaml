# Cell 8 "Dark Ages" - continuous anchor. Same confounded HC data, velocities
# masked, propensities discarded. KZ interval variant (non-identifiable).
mode: causal_cells
cell: 8
anchor: continuous
task_env: HalfCheetah-v5
eval_env: causal/halfcheetah-cell2
behavior_policy: unknown
mask_spec: velocities
tiers:
  g1d1p5: causal/halfcheetah/cell7-g1-d1p5-v0
dataset_expect:
  g1d1p5:
    gamma: 1.0
    delta: 1.5
algos:
  basic: bc
  variant: kz_select
  kz_candidates: ens_pessimistic
seeds: [0, 1, 2, 3, 4]
training:
  n_steps: 100000
  batch_size: 256
ope:
  fqe_iters: 2000
  fqe_sync_every: 20
  kz_gamma: 2.0
evaluation:
  n_episodes: 30
  curve_episodes: 10
# Anchor-level regret normalizer (Phase-6C ruling): J_ref^cont =
# max(J_SAC=9516, J_behavior_medium=12451). SAC's 9.5k is logged as
# the reference row; regret uses this constant so it stays >= 0.
reference_normalizer: 12451
reference:
  env: causal/halfcheetah-cell1
  algo: sac
  tag: relu8
  n_episodes: 250
  rollout_len: 1024
  n_train_envs: 8
  n_eval_envs: 8
  n_checkpoints: 12
  deterministic: true
