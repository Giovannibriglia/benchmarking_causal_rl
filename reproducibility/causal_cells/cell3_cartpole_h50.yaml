# Cell 3, discrete anchor, HORIZON-CAPPED (50-step) medium tier.
# Purpose: full-episode IPW products degenerate on 200+-step CartPole
# episodes (curse of horizon - see Phase-3 summary); this 50-step tier keeps
# importance products finite so the IPW(known) ~ DR acceptance relation can
# be demonstrated on real env data (it is exact on the analytic fixture).
mode: causal_cells
cell: 3
anchor: discrete
task_env: CartPole-v1
behavior_policy: known
mask_spec: null
tiers:
  medium50: causal/cartpole/medium50-v0
algos:
  basic: bc
seeds: [0, 1, 2, 3, 4]
training:
  n_steps: 4000
  batch_size: 256
ope:
  fqe_iters: 4000
  fqe_sync_every: 10
evaluation:
  n_episodes: 100
# Train-or-load per-seed Cell-1 reference (cached under references/;
# regenerated deterministically on a fresh clone - no gitignored deps).
reference:
  env: causal/cartpole-cell1
  algo: ppo
  n_episodes: 150
  rollout_len: 512
  n_train_envs: 8
  n_eval_envs: 8
  deterministic: true
