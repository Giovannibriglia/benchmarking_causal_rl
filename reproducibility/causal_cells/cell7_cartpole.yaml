# Cell 7 "Shadowed Vitals" - discrete anchor.
# Offline, Z observed, pi_b KNOWN, U confounds BOTH action and reward
# (collected via ConfoundedEnv + ConfoundedExplorer, beta=1, delta=0.5;
# gate-checked at collection AND at load). Backdoor fails; basic learners
# inherit the bias; the delphic variant is bias-averse via ensemble
# pessimism. J is evaluated in the TRUE unconfounded env.
mode: causal_cells
cell: 7
anchor: discrete
task_env: CartPole-v1
behavior_policy: known
mask_spec: null
tiers:
  b1d05: causal/cartpole/cell7-b1-d0p5-v0
algos:
  basic: bc
  variant: ens_pessimistic
seeds: [0, 1, 2, 3, 4]
training:
  n_steps: 4000
  batch_size: 256
ope:
  fqe_iters: 6000
  fqe_sync_every: 10
evaluation:
  n_episodes: 100
# Train-or-load per-seed Cell-1 reference (cached under references/;
# regenerated deterministically on a fresh clone - no gitignored deps).
reference:
  env: causal/cartpole-cell1
  algo: ppo
  n_episodes: 150
  rollout_len: 512
  n_train_envs: 8
  n_eval_envs: 8
  deterministic: true
