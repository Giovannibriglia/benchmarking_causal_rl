# Cell 5 "Doctor's Intuition" - discrete anchor.
# Offline, Z observed, pi_b UNKNOWN: logged propensities are DISCARDED at
# load; IPW must clone pi_b; DM stays consistent. Same medium-tier data as
# cell 3 - the cell differs only in what the learner is allowed to know.
mode: causal_cells
cell: 5
anchor: discrete
task_env: CartPole-v1
behavior_policy: unknown
mask_spec: null
tiers:
  medium: causal/cartpole/medium-v0
algos:
  basic: bc
  variant: cql
seeds: [0, 1, 2, 3, 4]
training:
  n_steps: 4000
  batch_size: 256
ope:
  fqe_iters: 6000
  fqe_sync_every: 10
evaluation:
  n_episodes: 100
# Train-or-load per-seed Cell-1 reference (cached under references/;
# regenerated deterministically on a fresh clone - no gitignored deps).
reference:
  env: causal/cartpole-cell1
  algo: ppo
  n_episodes: 150
  rollout_len: 512
  n_train_envs: 8
  n_eval_envs: 8
  deterministic: true
