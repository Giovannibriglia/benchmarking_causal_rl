# Cell 4 "Burned Files" - discrete anchor.
# Offline, pi_b KNOWN, Z hidden: cell-3 medium data with velocities masked
# at learner input (load-time switch; full obs stay stored). Basic: BC on the
# masked view. Variant: proxy-augmented imitation (Tennenholtz-style proxies
# = adjacent-step observations; honest framing in src/offline/proximal.py).
# Expectation: PARTIAL recovery vs BC.
mode: causal_cells
cell: 4
anchor: discrete
task_env: CartPole-v1
eval_env: causal/cartpole-cell2   # learner's masked view at deployment
behavior_policy: known
mask_spec: velocities
tiers:
  medium: causal/cartpole/medium-v0
algos:
  basic: bc
  variant: proximal
seeds: [0, 1, 2, 3, 4]
training:
  n_steps: 4000
  batch_size: 256
ope:
  fqe_iters: 6000
  fqe_sync_every: 10
evaluation:
  n_episodes: 100
# Train-or-load per-seed Cell-1 reference (cached under references/;
# regenerated deterministically on a fresh clone - no gitignored deps).
reference:
  env: causal/cartpole-cell1
  algo: ppo
  n_episodes: 150
  rollout_len: 512
  n_train_envs: 8
  n_eval_envs: 8
  deterministic: true
