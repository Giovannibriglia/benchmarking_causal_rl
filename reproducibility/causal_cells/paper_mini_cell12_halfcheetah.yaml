# Cells 1-2, continuous anchor, paper_mini scale (Phase-2 acceptance).
# Cell 1 = causal/halfcheetah-cell1 (reference task, full obs)
# Cell 2 basic = causal/halfcheetah-cell2 (qvel masked, feed-forward PPO)
# Cell 2 variant = causal/halfcheetah-cell2fs (masked + frame-stack PPO)
env:
  envs: causal/halfcheetah-cell1 causal/halfcheetah-cell2 causal/halfcheetah-cell2fs
  n_train_envs: 8
  n_eval_envs: 8
  rollout_len: 1024
  seed: 42
training:
  algos: ppo
  n_episodes: 60
  n_checkpoints: 6
  deterministic: true
