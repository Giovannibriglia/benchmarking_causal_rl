# Cell 8 "Dark Ages" - discrete anchor. The hardest cell: SAME confounded
# data as cell 7, but Z hidden (velocities masked at load), pi_b unknown
# (propensities discarded). Non-identifiable; expectation: basic regret is
# the matrix maximum; delphic gives pessimism, not recovery (Props 3-4).
mode: causal_cells
cell: 8
anchor: discrete
task_env: CartPole-v1
eval_env: causal/cartpole-cell2   # learner's masked view at deployment
behavior_policy: unknown
mask_spec: velocities
tiers:
  b1d05: causal/cartpole/cell7-b1-d0p5-v0
algos:
  basic: bc
  # Phase-5 gate-approved switch: the Cell-8 variant is the Kallus-Zhou
  # sensitivity-interval EVALUATION - the lower-bound maximizer among
  # already-trained candidates (no new training loop). Bootstrap-ensemble
  # pessimism is structurally blind here (see docs/causal_cells.md).
  variant: kz_select
  kz_candidates: ens_pessimistic
seeds: [0, 1, 2, 3, 4]
training:
  n_steps: 4000
  batch_size: 256
ope:
  fqe_iters: 6000
  fqe_sync_every: 10
  kz_gamma: 2.0
evaluation:
  n_episodes: 100
# Train-or-load per-seed Cell-1 reference (cached under references/;
# regenerated deterministically on a fresh clone - no gitignored deps).
reference:
  env: causal/cartpole-cell1
  algo: ppo
  n_episodes: 150
  rollout_len: 512
  n_train_envs: 8
  n_eval_envs: 8
  deterministic: true
