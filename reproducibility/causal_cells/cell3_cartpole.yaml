# Cell 3 "Perfect Archive" - discrete anchor, tier sweep (coverage axis §5).
# Offline, Z observed, pi_b KNOWN (exact propensities logged at collection),
# no confounding. Basic: BC. Variant: CQL (d3rlpy). Backdoor holds; IPW & DM
# valid under coverage; expert tier = narrow support.
mode: causal_cells
cell: 3
anchor: discrete
task_env: CartPole-v1
behavior_policy: known
mask_spec: null
tiers:
  simple: causal/cartpole/simple-v0
  medium: causal/cartpole/medium-v0
  expert: causal/cartpole/expert-v0
algos:
  basic: bc
  variant: cql
seeds: [0, 1, 2, 3, 4]
training:
  n_steps: 4000
  batch_size: 256
ope:
  fqe_iters: 6000
  fqe_sync_every: 10
evaluation:
  n_episodes: 100
# Train-or-load per-seed Cell-1 reference (cached under references/;
# regenerated deterministically on a fresh clone - no gitignored deps).
reference:
  env: causal/cartpole-cell1
  algo: ppo
  n_episodes: 150
  rollout_len: 512
  n_train_envs: 8
  n_eval_envs: 8
  deterministic: true
