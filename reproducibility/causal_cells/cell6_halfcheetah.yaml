# Cell 6 "Fog of History" - continuous anchor.
mode: causal_cells
cell: 6
anchor: continuous
task_env: HalfCheetah-v5
eval_env: causal/halfcheetah-cell2
behavior_policy: unknown
mask_spec: velocities
tiers:
  medium: mujoco/halfcheetah/medium-v0
algos:
  basic: bc
  # variant latent_wm is discrete-anchor-only (Phase-5); continuous
  # proximal / recurrent latent-WM = future work. Basic-only here; the
  # history-recoverable recovery story is established on the discrete anchor.
seeds: [0, 1, 2, 3, 4]
training:
  n_steps: 100000
  batch_size: 256
ope:
  fqe_iters: 2000
  fqe_sync_every: 20
evaluation:
  n_episodes: 30
  curve_episodes: 10
# Regret normalizer: anchor-level constant J_ref^cont (Phase-6C
# ruling). Per-seed SAC references are trained separately and feed
# only the Cell-1 learning-curve panel, not these regret numbers.
reference_normalizer: 12451
