# Cell 7 "Shadowed Vitals" - continuous anchor. Confounded HC (gamma=1,
# delta=1.5 ~= 1 per-step reward std), pi_b known, Z observed. Gate-checked.
mode: causal_cells
cell: 7
anchor: continuous
task_env: HalfCheetah-v5
behavior_policy: known
mask_spec: null
tiers:
  g1d1p5: causal/halfcheetah/cell7-g1-d1p5-v0
dataset_expect:
  g1d1p5:
    gamma: 1.0
    delta: 1.5
algos:
  basic: bc
  variant: ens_pessimistic
seeds: [0, 1, 2, 3, 4]
training:
  n_steps: 100000
  batch_size: 256
ope:
  fqe_iters: 2000
  fqe_sync_every: 20
evaluation:
  n_episodes: 30
  curve_episodes: 10
# Regret normalizer: anchor-level constant J_ref^cont (Phase-6C
# ruling). Per-seed SAC references are trained separately and feed
# only the Cell-1 learning-curve panel, not these regret numbers.
reference_normalizer: 12451
